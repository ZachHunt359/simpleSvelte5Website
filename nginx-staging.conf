# Nginx configuration for staging environment
# To be placed at /etc/nginx/sites-available/paranoid-comic-staging
# Enable with: sudo ln -s /etc/nginx/sites-available/paranoid-comic-staging /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name dev.23-187-248-222.sslip.io;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.23-187-248-222.sslip.io;
    
    # SSL certificates (obtain with: sudo certbot --nginx -d dev.23-187-248-222.sslip.io)
    ssl_certificate /etc/letsencrypt/live/dev.23-187-248-222.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.23-187-248-222.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://code.iconify.design; connect-src 'self' https://api.iconify.design https://api.unisvg.com https://api.simplesvg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;
    
    # Optional: Basic auth for staging (uncomment and set credentials)
    # auth_basic "Staging Environment";
    # auth_basic_user_file /etc/nginx/.htpasswd-staging;
    
    # Client max body size for uploads
    client_max_body_size 100M;
    
    # Root directory for static files
    root /home/deploy/simpleSvelte5Website/build/client;
    index index.html;
    
    # Serve static assets with caching
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Serve static panels with cache busting support
    location /panels/ {
        alias /home/deploy/simpleSvelte5Website/static/panels/;
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
    
    # Force panels.json through SvelteKit endpoint (dynamic with no-cache)
    location = /panels.json {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # API routes - proxy to Node.js app on port 3001 (staging)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # SvelteKit app - proxy everything else to Node.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
}