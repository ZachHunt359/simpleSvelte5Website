# Nginx configuration for production environment
# To be placed at /etc/nginx/sites-available/paranoidcomic.com
# Enable with: sudo ln -s /etc/nginx/sites-available/paranoidcomic.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name paranoidcomic.com www.paranoidcomic.com;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name paranoidcomic.com www.paranoidcomic.com;
    
    # SSL certificates managed by Certbot
    ssl_certificate /etc/letsencrypt/live/paranoidcomic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paranoidcomic.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # SSL protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Security headers
    add_header X-Frame-Options \"SAMEORIGIN\" always;
    add_header X-Content-Type-Options \"nosniff\" always;
    add_header X-XSS-Protection \"1; mode=block\" always;
    add_header Referrer-Policy \"strict-origin-when-cross-origin\" always;
    add_header Content-Security-Policy \"default-src 'self'; script-src 'self' 'unsafe-inline' https://code.iconify.design; connect-src 'self' https://api.iconify.design https://api.unisvg.com https://api.simplesvg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com;\" always;
    
    # Client max body size for uploads
    client_max_body_size 100M;
    
    # Logging
    access_log /var/log/nginx/paranoidcomic.access.log;
    error_log /var/log/nginx/paranoidcomic.error.log;
    
    # Root directory for static files
    root /home/deploy/simpleSvelte5Website/build/client;
    index index.html;
    
    # Serve static assets with caching
    location /_app/ {
        expires 1y;
        add_header Cache-Control \"public, immutable\";
        try_files $uri =404;
    }
    
    # Disable caching for _order.json
    location /panels/_order.json {
        alias /home/deploy/simpleSvelte5Website/static/panels/_order.json;
        add_header Cache-Control \"no-store, no-cache, must-revalidate\" always;
        add_header Pragma \"no-cache\" always;
        add_header Expires \"0\" always;
        try_files $uri =404;
    }
    
    # Serve static panels with cache busting support
    location /panels/ {
        alias /home/deploy/simpleSvelte5Website/static/panels/;
        expires 1y;
        add_header Cache-Control \"public\";
        try_files $uri =404;
    }
    
    # WebP content type handler
    location ~* \.webp$ {
        add_header Content-Type image/webp;
        add_header Cache-Control \"public, max-age=31536000, immutable\";
        try_files $uri =404;
    }
    
    # Force panels.json through SvelteKit endpoint (dynamic with no-cache)
    location = /panels.json {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control \"no-store, no-cache, must-revalidate\" always;
    }

    # API routes - proxy to Node.js app on port 3000 (production)
    location /api/ {
        client_max_body_size 100M;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # Netdata reverse-proxy
    include /etc/nginx/snippets/netdata.conf;
    
    # SvelteKit app - proxy everything else to Node.js
    location / {
        client_max_body_size 100M;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
}
